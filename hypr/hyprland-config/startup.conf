env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/gcr/ssh

# See https://wiki.hyprland.org/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --all

#exec-once = hyprpm reload -n
exec-once = hypridle &

# Execute your favorite apps at launch
exec = pkill waybar; waybar &
exec-once = ~/.dotfiles/scripts/album_art_watcher.sh &
exec-once = sh -lc 'if command -v awww >/dev/null 2>&1; then "$HOME/.dotfiles/scripts/awww_wallpaper_watcher.sh" & elif command -v hyprpaper >/dev/null 2>&1; then hyprpaper & fi'
exec-once = firefox
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/bin/kdeconnectd
exec-once = /usr/bin/hyprsunset
exec-once = /usr/bin/anyrun daemon
exec-once = ~/.dotfiles/scripts/start_codex_self_improve_service.sh
