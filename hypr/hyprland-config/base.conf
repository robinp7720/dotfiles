env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland

#env = GTK_THEME,Adapta

#
# Shared Hyprland defaults used by both the main session and greetd.
# Keep session-specific startup/apps/binds in separate files.
#

# Some default env vars.
env = XCURSOR_SIZE,24
# Set a non-default cursor theme so we don't see the Hyprland logo cursor
env = XCURSOR_THEME,capitaine-cursors

# Hyprland versions without the `cursor` block will fail verify; rely on env vars.
# If you later upgrade Hyprland and want hyprcursor, you can add:
# cursor {
#     default_hyprcursor_theme = capitaine-cursors
#     default_hyprcursor_size = 24
# }

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = yes
    extend_border_grab_area = 10

    allow_tearing = true

    layout = dwindle
}

misc {
    vfr = true
}

animations {
    enabled = yes

    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
}

decoration {
    rounding = 8

        shadow {
            enabled = true
                range = 300
                render_power = 4
                color = rgba(1a1a1aaf)
                offset = 0 40
                scale = 0.9
        }

    dim_around = 0.7

        inactive_opacity = 1
        active_opacity = 1

        blur {
            ignore_opacity = false
                new_optimizations = true
                enabled = true
                size = 7
                xray = false
                passes = 3
                popups = true
                special = true
        }
}

layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace dot-launcher
layerrule = blur on, match:namespace kitty-quick-access
layerrule = blur on, match:namespace anyrun
#layerrule = ignore_alpha 0.5, match:namespace anyrun
layerrule = ignore_alpha on, match:namespace rofi
layerrule = ignore_alpha on, match:namespace dot-launcher

#layerrule = dimaround, rofi

#workspace = w[t1], gapsout:0, gapsin:0
#windowrule = border_size 0, match:float 0, match:workspace w[t1]
#windowrule = rounding 0, match:float 0, match:workspace w[t1]

#workspace = w[tg1], gapsout:0, gapsin:0
#windowrule = border_size 0, match:float 0, match:workspace w[tg1]
#windowrule = rounding 0, match:float 0, match:workspace w[tg1]

#workspace = w[t2], gapsout:0, gapsin:2
#windowrule = bordersize 0, match:float 0, match:workspace w[t2]
#windowrule = rounding 0, match:float 0, match:workspace w[t2]

#workspace = f[1], gapsout:0, gapsin:0
#windowrule = bordersize 0, match:float 0, match:workspace f[1]
#windowrule = rounding 0, match:float 0, match:workspace f[1]

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    allow_small_split = true
}

debug {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_logs = false
    enable_stdout_logs = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gesture = 3, horizontal, workspace
    # Removed in recent Hyprland builds; plugin gesture toggle remains below.
    # hyprexpo-gesture = 3, vertical, expo, toggle
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrule = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

#windowrule = dimaround on, ^(polkit-gnome-authentication-agent-1)$
