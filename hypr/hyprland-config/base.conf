env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland

#env = GTK_THEME,Adapta

#
# Shared Hyprland defaults used by both the main session and greetd.
# Keep session-specific startup/apps/binds in separate files.
#

# Some default env vars.
env = XCURSOR_SIZE,24
# Set a non-default cursor theme so we don't see the Hyprland logo cursor
env = XCURSOR_THEME,capitaine-cursors

# Hyprland versions without the `cursor` block will fail verify; rely on env vars.
# If you later upgrade Hyprland and want hyprcursor, you can add:
# cursor {
#     default_hyprcursor_theme = capitaine-cursors
#     default_hyprcursor_size = 24
# }

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = yes
    extend_border_grab_area = 10

    allow_tearing = true

    layout = dwindle
}

animations {
    enabled = yes

    # bezier=overshot,0.05,0.9,0.1,1.1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
}

decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000066)
        offset = 0 8
        scale = 0.95
    }

    dim_around = 0.7

    inactive_opacity = 1
    active_opacity = 1

    blur {
        ignore_opacity = false
        new_optimizations = true
        enabled = true
        size = 7
        xray = false
        passes = 3
        popups = true
        special = true
    }
}

layerrule = blur on, match:namespace Luma
layerrule = blur on, match:namespace kitty-quick-access
layerrule = blur on, match:namespace anyrun
layerrule = blur on, match:namespace vigil
layerrule = blur on, match:namespace waybar
layerrule = no_anim on, match:namespace vigil-control-center
#layerrule = ignore_alpha 0.5, match:namespace anyrun
layerrule = ignore_alpha 0.45, match:namespace Luma
layerrule = ignore_alpha 0.20, match:namespace vigil
layerrule = ignore_alpha 0.20, match:namespace waybar

#workspace = w[t1], gapsout:0, gapsin:0
#windowrule = border_size 0, match:float 0, match:workspace w[t1]
#windowrule = rounding 0, match:float 0, match:workspace w[t1]

#workspace = w[tg1], gapsout:0, gapsin:0
#windowrule = border_size 0, match:float 0, match:workspace w[tg1]
#windowrule = rounding 0, match:float 0, match:workspace w[tg1]

#workspace = w[t2], gapsout:0, gapsin:2
#windowrule = bordersize 0, match:float 0, match:workspace w[t2]
#windowrule = rounding 0, match:float 0, match:workspace w[t2]

#workspace = f[1], gapsout:0, gapsin:0
#windowrule = bordersize 0, match:float 0, match:workspace f[1]
#windowrule = rounding 0, match:float 0, match:workspace f[1]

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    allow_small_split = true
}

debug {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    vfr = true
    disable_logs = false
    enable_stdout_logs = true
}

gestures {
    #gesture = 3, vertical, dispatcher, hymission:toggle,forceall
    #gesture = 3, vertical, dispatcher, hymission:toggle,recommand
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gesture = 3, horizontal, workspace

}

plugin {
    hymission {
        outer_padding_top = 92
        outer_padding_right = 32
        outer_padding_bottom = 32
        outer_padding_left = 32
        row_spacing = 32
        column_spacing = 32
        min_window_length = 120
        min_preview_short_edge = 32
        small_window_boost = 1.35
        max_preview_scale = 0.95
        workspace_overview_max_preview_scale = 0.95
        min_slot_scale = 0.10
        natural_scale_flex = 0.22
        layout_engine = grid
        layout_scale_weight = 1.0
        layout_space_weight = 0.10

        expand_selected_window = 1
        overview_focus_follows_mouse = 1
        multi_workspace_sort_recent_first = 1
        niri_mode = 0
        niri_scroll_pixels_per_delta = 1.0
        niri_workspace_scale = 1.0
        niri_scrolling_preview_gap = 0
        toggle_switch_mode = 1
        switch_toggle_auto_next = 1
        switch_release_key = Super_L
        #gesture_invert_vertical = 0
        one_workspace_per_row = 0
        only_active_workspace = 0
        only_active_monitor = 0
        show_special = 0
        workspace_change_keeps_overview = 1
        hide_hyprbars_during_overview = 0

        workspace_strip_anchor = left
        workspace_strip_empty_mode = existing
        workspace_strip_thickness = 160
        workspace_strip_gap = 24
        hide_bar_when_strip = 1
        hide_bar_animation = 1
        hide_bar_animation_blur = 1
        hide_bar_animation_move_multiplier = 0.8
        hide_bar_animation_scale_divisor = 1.1
        hide_bar_animation_alpha_end = 0
        bar_single_mission_control = 0
        show_focus_indicator = 0
        backdrop_blur = 0
        backdrop_color = rgba(00000000)
        focus_hover_color = rgba(f2f7ff8c)
        focus_selected_color = rgba(3dc7fff2)
        focus_hover_thickness = 2
        focus_selected_thickness = 4
        workspace_strip_inactive_tint_color = rgba(00000000)

        debug_logs = 0
        debug_surface_logs = 0
    }
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrule = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

#windowrule = dimaround on, ^(polkit-gnome-authentication-agent-1)$
