source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 5
    contrast = 1.05
    brightness = 0.78
    vibrancy = 0.25
    vibrancy_darkness = 0.2
}

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $foreground_dim
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 280
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = $accent
    font_size = 98
    font_family = JetBrains Mono ExtraBold
    position = 0, 185
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.face
    size = 112
    border_size = 3
    border_color = $accent
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text = Enter password to unlock
    color = $foreground_dim
    font_size = 16
    font_family = JetBrains Mono
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 62
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.3
    dots_center = true
    outer_color = $accent
    inner_color = rgba(0, 0, 0, 0.32)
    font_color = $foreground
    fade_on_empty = false
    rounding = 20
    check_color = $accent
    fail_color = $error
    placeholder_text = Password
    hide_input = false
    position = 0, -110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] ~/.dotfiles/scripts/next_event.sh
    color = $foreground
    font_size = 15
    font_family = JetBrains Mono
    position = 0, -190
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.cache/hyprlock/album.jpg
    size = 132
    border_size = 2
    border_color = $accent
    rounding = 14
    position = 0, 126
    reload_time = 2
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] ~/.dotfiles/scripts/now_playing.sh
    color = $foreground
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 36
    halign = center
    valign = bottom
}
