# Shared baseline aligned with the main Hyprland session.
source = /etc/nwg-hello/base.conf

# Match primary desktop AQ renderer/GPU order.
env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1

# Use shared monitor layout installed by setup.sh.
source = /etc/nwg-hello/monitors.conf

bind = ALT, Q, killactive

misc {
    disable_hyprland_logo = true
}
animations {
    enabled = false
}

cursor {
    no_hardware_cursors = 1
}

exec-once = nwg-hello; hyprctl dispatch exit
